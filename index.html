<!DOCTYPE html>
<html>

<head>
    <title>🌊</title>
    <style>
        body {
            background-color: lightblue;
        }

        h1 {
            color: steelblue;
            font-size: 50px;
            font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            text-shadow:0px 2px 4px #FFF;
        }
        
        .div1 {
            display: flex;
            flex-direction: column;
            flex-wrap:nowrap;
        }

        #pinkytoe:hover {
            cursor:none;
        }

        input[type="checkbox"] {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }
        #toggle {
            height: 32px;
            width: 52px;
            border-radius: 16px;
            display: inline-block;
            position: relative;
            border: 2px solid white;
            background: linear-gradient(90deg, grey 0%, steelblue 100%);
            transition: all .2s ease;
        }
        #toggle:after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 1px 3px black;
            transition: all .2s cubic-bezier(.5,.1,.75,1.35);
        }
        #toggle:checked {
            border-color: black;
        }
        #toggle:checked:after {
            transform: translatex(20px)
        }
                
    </style>
    <script>
        const timer = ms => new Promise(res => setTimeout(res, ms));
        async function play(){
            var elegant = document.getElementById("elegant");
            elegant.play();
            await timer(1000);
            title.innerHTML = "Ethan Shed";
            await timer(1550);
            title.innerHTML = "Ethan She";
            await timer(1550);
            title.innerHTML = "Ethan Sh";
            await timer(1550);
            title.innerHTML = "Ethan S";
            await timer(1550);
            title.innerHTML = "Ethan";
            await timer(1550);
            title.innerHTML = "Etha";
            await timer(1550);
            title.innerHTML = "Eth";
            await timer(1550);
            title.innerHTML = "Et";
            await timer(1550);
            title.innerHTML = "E";
            await timer(1550);
            title.innerHTML = "";
            setTimeout(function() { 
                alert("Have you heard of \"up dog\"?");
            }, 4050);
            setTimeout(function() { 
                document.getElementById("reveal1").style.display = "block";
            }, 11550);
            setTimeout(function() {
                document.getElementById("reveal2").style.display = "block";
            }, 26550);
            setTimeout(function() {
                document.getElementById("reveal3").style.display = "block";
            }, 40550);
        }
        function change() {
            var toggle = document.getElementById('toggle');
            var img = document.getElementById("img").style;
            var titles = document.getElementsByTagName('H1');
            var hint = document.getElementById("hint");
            for(i = 0; i < titles.length; i++) {
                var title = titles[i];
                if (toggle.checked) {
                    title.style.color = "black";
                    title.style.fontFamily = "'Courier New', Courier, monospace"
                    title.style.textShadow = "0px 0px 0px black";
                    document.body.style.backgroundColor = "white";
                    img.borderRadius = "0px";
                    img.border = "0px";
                } else {
                    title.style.color = "steelblue";
                    title.style.fontFamily = "Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif"
                    title.style.textShadow = "0px 2px 4px #FFF";
                    document.body.style.backgroundColor = "lightblue";
                    img.borderRadius = "10px";
                    img.border = "5px solid #555";
                }
            }
            hint.style.display = "block";
        }
    </script>
</head>

<body>
    <h1 id="title">Ethan Shedd</h1>
    <h1 id="reveal1" style="display: none;">What's "up dog"?</h2>
    <h1 id="reveal2" style="display: none;">Not much, you?</h2>
    <h1 id="reveal3" style="display: none;">Fin</h2>
    <div class="div1">
        <img id="img" style="width:700px;height:550px;border: 5px solid #555;border-radius:10px;" 
            src="images/FEETMAP.jpeg" alt="psst click the toe" usemap="#Map" />
        <map name="Map" id="Map">
            <area alt="big toe" href="subpage/hawkers.html" shape="rect"
                coords="213,90,309,226"/>
            <area alt="longest toe" href="subpage/drumper.html" shape="rect"
                coords="307,72,367,235"/>
            <area alt="middle toe" href="subpage/手.html" shape="rect"
                coords="374,105,420,246"/>
            <area alt="ring toe" href="subpage/autobiography.html" shape="rect"
                coords="424,153,469,291"/>
            <area id="pinkytoe" alt="pinky toe" onclick="play();" shape="rect"
                coords="469,227,509,311"/>
        </map>
        <input type="checkbox" id="toggle" onclick="change();">
        <p id="hint" style="font-size: 15px; font-family: 'Courier New', Courier, monospace; display: none">(hint: click on the toes)</p>
    </div>
    <audio id="elegant" src="sounds/danse-macabre.mp3"></audio>
</body>

</html>
